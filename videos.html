        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {

        .nav-link { font-size: 10.5px; font-weight: 500; letter-spacing: .22em; text-transform: uppercase; color: rgba(255,255,255,.6); position: relative; transition: color .25s; }
        .nav-link::after { content: ''; position: absolute; bottom: -5px; left: 0; width: 0; height: 1px; background: var(--accent); transition: width .3s; }

        .page-sub { font-size: 12px; color: var(--muted); letter-spacing: .08em; margin-top: 16px; }

        /* VIDEO GRID */
        .videos-wrap { max-width: 1320px; margin: 0 auto; padding: 0 48px 100px; }
        .videos-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; }

        .vid-item {
            position: relative; aspect-ratio: 9/16; overflow: hidden;
            background: var(--bg-card); cursor: pointer;
        }
        .vid-item video { width: 100%; height: 100%; object-fit: cover; display: block; }
        .vid-item-overlay {
            position: absolute; inset: 0;
            background: linear-gradient(to top, rgba(0,0,0,.65) 0%, transparent 50%);
            display: flex; align-items: center; justify-content: center;
            transition: background .3s;

        .vid-item:hover .vid-item-overlay { background: linear-gradient(to top, rgba(0,0,0,.4) 0%, transparent 40%); }
        .vid-play {
            width: 48px; height: 48px;
            border: 1.5px solid rgba(255,255,255,.6); border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            transition: border-color .25s, transform .25s;
        }
        .vid-item:hover .vid-play { border-color: var(--accent); transform: scale(1.1); }
        .vid-item.playing .vid-play { opacity: 0; }
        .vid-num {
            position: absolute; bottom: 12px; left: 14px;
            font-size: 9px; letter-spacing: .2em; text-transform: uppercase;
            color: rgba(255,255,255,.45);

        .foot-nav a:hover { color: var(--accent); }
        .foot-socials { display: flex; gap: 18px; justify-content: flex-end; }
        .fs { color: var(--muted); cursor: pointer; transition: color .2s; }

        .foot-copy { grid-column: 1/-1; text-align: center; font-size: 9.5px; color: rgba(255,255,255,.12); letter-spacing: .1em; padding-top: 20px; border-top: 1px solid var(--border); }

        /* RESPONSIVE */

<script>
/* CURSOR */
const cur = document.getElementById('cursor');
const ring = document.getElementById('cursorRing');
let mx = 0, my = 0, rx = 0, ry = 0;
document.addEventListener('mousemove', e => { mx = e.clientX; my = e.clientY; cur.style.left = mx+'px'; cur.style.top = my+'px'; });
(function animRing() { rx += (mx-rx)*.12; ry += (my-ry)*.12; ring.style.left = rx+'px'; ring.style.top = ry+'px'; requestAnimationFrame(animRing); })();
document.querySelectorAll('a,button,.vid-item').forEach(el => {
    el.addEventListener('mouseenter', () => { cur.classList.add('h'); ring.classList.add('h'); });
    el.addEventListener('mouseleave', () => { cur.classList.remove('h'); ring.classList.remove('h'); });
});

/* NAVBAR scroll */
window.addEventListener('scroll', () => {
    document.getElementById('navbar').classList.toggle('scrolled', window.scrollY > 40);
});

/* MOBILE MENU */
function menuOpen()  { document.getElementById('mobileMenu').classList.add('open'); }
function menuClose() { document.getElementById('mobileMenu').classList.remove('open'); }

/* BUILD VIDEO GRID */
const videos = [
    'video/video_imax_1.mp4',
    'video/video_imax_2.mp4',
    'video/video_imax_3.mp4',
    'video/video_imax_4.mp4',
    'video/video_imax_5.mp4',
    'video/video_imax_6.mp4',
    'video/video_imax_7.mp4',
    'video/video_imax_8.mp4',
    'video/video_imax_9.mp4',
    'video/video_imax_10.mp4',
    'video/video_imax_11.MP4',
    'video/video_imax_12.mp4',
];

const grid = document.getElementById('videosGrid');
videos.forEach((src, i) => {
    const item = document.createElement('div');
    item.className = 'vid-item';
    item.innerHTML = `
        <video muted loop playsinline data-src="${src}"></video>
        <div class="vid-item-overlay">
            <div class="vid-play">
                <svg width="12" height="14" viewBox="0 0 12 14" fill="white"><path d="M0 0l12 7-12 7z"/></svg>
            </div>
        </div>
        <div class="vid-num">${String(i+1).padStart(2,'0')}</div>
    `;
    grid.appendChild(item);
});

/* LAZY LOAD — load src only when near viewport */
const lazyObs = new IntersectionObserver((entries) => {
    entries.forEach(e => {
        if (!e.isIntersecting) return;
        const vid = e.target.querySelector('video');
        if (vid && vid.dataset.src && !vid.src) {
            vid.src = vid.dataset.src;
        }
    });
}, { rootMargin: '200px' });
document.querySelectorAll('.vid-item').forEach(el => lazyObs.observe(el));

/* PLAY/PAUSE on hover */
document.querySelectorAll('.vid-item').forEach(item => {
    const vid = item.querySelector('video');
    item.addEventListener('mouseenter', () => {
        if (!vid.src && vid.dataset.src) vid.src = vid.dataset.src;
        vid.play();
        item.classList.add('playing');
    });
    item.addEventListener('mouseleave', () => {
        vid.pause();
        vid.currentTime = 0;
        item.classList.remove('playing');
    });
});

/* TOUCH — tap to play/pause on mobile */
document.querySelectorAll('.vid-item').forEach(item => {
    const vid = item.querySelector('video');
    item.addEventListener('click', () => {
        if (!vid.src && vid.dataset.src) vid.src = vid.dataset.src;
        if (vid.paused) { vid.play(); item.classList.add('playing'); }
        else { vid.pause(); item.classList.remove('playing'); }
    });
});
</script>
